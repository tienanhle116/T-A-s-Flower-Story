<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoa Tổng Hợp | T&A's Flower Story</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f8f2ea;
      color: #4a3b35;
      font-family: 'Montserrat', sans-serif;
    }

    header {
      min-height: 90px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 0 10%;
      background: #f8f2ea;
      box-shadow: 0 1px 0 rgba(74, 59, 53, 0.08);
    }

    .logo {
      color: #4a3b35;
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      letter-spacing: 1px;
      text-decoration: none;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
      flex-wrap: wrap;
    }

    .back-link,
    .cart-link {
      color: #4a3b35;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover,
    .cart-link:hover {
      color: #8b6651;
    }

    .cart-count {
      min-width: 20px;
      height: 20px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-left: 6px;
      background: #8b6651;
      color: #fffaf5;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1;
    }

    .lang-buttons {
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      border: 1px solid transparent;
      background: #d8c1ad;
      color: #4a3b35;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .lang-btn:hover {
      background: #c9aa93;
      transform: translateY(-1px);
    }

    .lang-btn.active {
      background: #8b6651;
      color: #fffaf5;
    }

    main {
      padding: 76px 10% 90px;
    }

    .intro {
      max-width: 820px;
      margin: 0 auto 44px;
      text-align: center;
    }

    .intro h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 78px);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 18px;
    }

    .intro p {
      color: #6a554c;
      line-height: 1.8;
    }

    .bouquets {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 32px;
      max-width: 1120px;
      margin: auto;
    }

    .bouquet-card {
      overflow: hidden;
      background: #fffaf5;
      border: 1px solid rgba(139, 102, 81, 0.14);
      border-radius: 22px;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(70, 40, 20, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .bouquet-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 46px rgba(70, 40, 20, 0.15);
    }

    .bouquet-card img {
      width: 100%;
      aspect-ratio: 4 / 5;
      display: block;
      object-fit: cover;
      background: #eadfd5;
    }

    .bouquet-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 24px;
    }

    .bouquet-info h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 600;
      line-height: 1.1;
    }

    .price {
      flex: 0 0 auto;
      background: #8b6651;
      color: #fffaf5;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 500;
    }

    .add-button {
      width: calc(100% - 48px);
      margin: 0 24px 24px;
      border: none;
      background: #8b6651;
      color: #fffaf5;
      padding: 14px 20px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 500;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .add-button:hover {
      background: #755541;
      transform: translateY(-1px);
    }

    footer {
      background: #3b2c25;
      color: #fff;
      text-align: center;
      padding: 25px;
    }

    @media (max-width: 820px) {
      header {
        flex-direction: column;
        padding: 24px;
        text-align: center;
      }

      nav {
        justify-content: center;
      }

      .bouquets {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      main {
        padding: 54px 20px 68px;
      }

      .logo {
        font-size: 32px;
      }

      .bouquet-info {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <a class="logo" href="index.html">T&A's Flower Story</a>
    <nav>
      <a class="back-link" href="index.html#flowers" id="backToCollection">Back to Collection</a>
      <a class="cart-link" href="cart.html"><span id="navCart">Cart</span> <span class="cart-count" data-cart-count>0</span></a>
      <div class="lang-buttons" aria-label="Language selector">
        <button class="lang-btn" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="vi">VI</button>
        <button class="lang-btn" type="button" data-lang="es">ES</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h1 id="pageTitle">Hoa Tổng Hợp</h1>
      <p id="pageIntro">Những bó hoa tổng hợp được phối mềm mại, ngọt ngào và phù hợp cho nhiều dịp đặc biệt.</p>
    </section>

    <section class="bouquets" aria-label="Mixed bouquet products">
      <article class="bouquet-card" data-add-card data-id="mixed-bouquet-1" data-name="Bó Tổng Hợp 1" data-price="60" data-image="assets/mixed-bouquet-1.jpg">
        <img src="assets/mixed-bouquet-1.jpg" alt="Bó hoa tổng hợp tông hồng với giấy gói màu hồng nhẹ">
        <div class="bouquet-info">
          <h2 id="bouquet1Name">Bó 1</h2>
          <span class="price">$60</span>
        </div>
        <button class="add-button" type="button" data-add-button>Add to Cart</button>
      </article>

      <article class="bouquet-card" data-add-card data-id="mixed-bouquet-2" data-name="Bó Tổng Hợp 2" data-price="55" data-image="assets/mixed-bouquet-2.jpg">
        <img src="assets/mixed-bouquet-2.jpg" alt="Bó hoa tổng hợp dạng hộp tròn với hoa hồng và hoa trắng">
        <div class="bouquet-info">
          <h2 id="bouquet2Name">Bó 2</h2>
          <span class="price">$55</span>
        </div>
        <button class="add-button" type="button" data-add-button>Add to Cart</button>
      </article>

      <article class="bouquet-card" data-add-card data-id="mixed-bouquet-3" data-name="Bó Tổng Hợp 3" data-price="70" data-image="assets/mixed-bouquet-3.jpg">
        <img src="assets/mixed-bouquet-3.jpg" alt="Bó hoa tổng hợp tông hồng trắng với nơ lưới">
        <div class="bouquet-info">
          <h2 id="bouquet3Name">Bó 3</h2>
          <span class="price">$70</span>
        </div>
        <button class="add-button" type="button" data-add-button>Add to Cart</button>
      </article>

      <article class="bouquet-card" data-add-card data-id="mixed-bouquet-4" data-name="Bó Tổng Hợp 4" data-price="75" data-image="assets/mixed-bouquet-4.jpg">
        <img src="assets/mixed-bouquet-4.jpg" alt="Bó hoa tổng hợp cận cảnh với hoa hồng, hoa cúc và lá xanh">
        <div class="bouquet-info">
          <h2 id="bouquet4Name">Bó 4</h2>
          <span class="price">$75</span>
        </div>
        <button class="add-button" type="button" data-add-button>Add to Cart</button>
      </article>
    </section>
  </main>

  <footer>T&A's Flower Story © 2026</footer>

  <script>
    const CART_KEY = "taFlowerCart";
    const LANG_KEY = "taFlowerLang";
    const pageText = {
      en: {
        title: "Mixed Bouquets",
        intro: "Softly arranged mixed bouquets for birthdays, gifts, and meaningful moments.",
        back: "Back to Collection",
        cart: "Cart",
        bouquet1: "Bouquet 1",
        bouquet2: "Bouquet 2",
        bouquet3: "Bouquet 3",
        bouquet4: "Bouquet 4",
        add: "Add to Cart",
        added: "Added to Cart"
      },
      vi: {
        title: "Hoa Tổng Hợp",
        intro: "Những bó hoa tổng hợp được phối mềm mại, ngọt ngào và phù hợp cho nhiều dịp đặc biệt.",
        back: "Quay lại bộ sưu tập",
        cart: "Giỏ hàng",
        bouquet1: "Bó 1",
        bouquet2: "Bó 2",
        bouquet3: "Bó 3",
        bouquet4: "Bó 4",
        add: "Thêm vào giỏ hàng",
        added: "Đã thêm vào giỏ"
      },
      es: {
        title: "Ramos Mixtos",
        intro: "Ramos mixtos arreglados con suavidad para cumpleaños, regalos y momentos especiales.",
        back: "Volver a la colección",
        cart: "Carrito",
        bouquet1: "Ramo 1",
        bouquet2: "Ramo 2",
        bouquet3: "Ramo 3",
        bouquet4: "Ramo 4",
        add: "Agregar al carrito",
        added: "Agregado al carrito"
      }
    };

    function currentLang() {
      return localStorage.getItem(LANG_KEY) || "en";
    }

    function setLanguage(lang) {
      const text = pageText[lang] || pageText.en;
      localStorage.setItem(LANG_KEY, lang);
      document.documentElement.lang = lang;
      document.title = `${text.title} | T&A's Flower Story`;
      document.getElementById("pageTitle").textContent = text.title;
      document.getElementById("pageIntro").textContent = text.intro;
      document.getElementById("backToCollection").textContent = text.back;
      document.getElementById("navCart").textContent = text.cart;
      document.getElementById("bouquet1Name").textContent = text.bouquet1;
      document.getElementById("bouquet2Name").textContent = text.bouquet2;
      document.getElementById("bouquet3Name").textContent = text.bouquet3;
      document.getElementById("bouquet4Name").textContent = text.bouquet4;

      document.querySelectorAll("[data-add-button]").forEach((button) => {
        button.textContent = text.add;
      });

      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const count = getCart().reduce((total, item) => total + item.quantity, 0);

      document.querySelectorAll("[data-cart-count]").forEach((badge) => {
        badge.textContent = count;
      });
    }

    function addToCart(product) {
      const cart = getCart();
      const existing = cart.find((item) => item.id === product.id);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      saveCart(cart);
    }

    document.querySelectorAll("[data-add-card]").forEach((card) => {
      card.addEventListener("click", () => {
        const button = card.querySelector(".add-button");

        addToCart({
          id: card.dataset.id,
          name: card.dataset.name,
          price: Number(card.dataset.price),
          image: card.dataset.image
        });

        button.textContent = pageText[currentLang()].added;
        setTimeout(() => {
          button.textContent = pageText[currentLang()].add;
        }, 1200);
      });
    });

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    setLanguage(currentLang());
    updateCartCount();
  </script>
</body>

</html>
